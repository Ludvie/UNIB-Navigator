<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNIB Navigator</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>" />
</head>
<body>

<div id="map"></div>

<!-- ===== TOP NAV (minimal) ===== -->
<nav class="topnav">
  <div class="topnav-brand">
    <div class="brand-logo">🧭</div>
    <div>
      <div class="brand-name">UNIB Navigator</div>
      <div class="brand-sub">A* Pathfinding System</div>
    </div>
  </div>
  <div class="topnav-actions">
    <button class="icon-btn" onclick="toggleMapLayer()" title="Ganti Layer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
    </button>
    <button class="icon-btn" onclick="getCurrentLocation()" title="Lokasi Saya">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="9" stroke-dasharray="4 2"/></svg>
    </button>
    <button class="icon-btn" id="loc-panel-btn" onclick="toggleLocationPanel()" title="Semua Lokasi">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </button>
    <button class="icon-btn" onclick="zoomToRoute()" title="Zoom Rute">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
  </div>
</nav>

<!-- ===== FLOATING BOTTOM PANEL ===== -->
<div class="bottom-panel" id="bottom-panel">

  <!-- Drag Handle -->
  <div class="panel-handle" onclick="togglePanelExpand()">
    <div class="handle-bar"></div>
  </div>

  <!-- COMPACT ROW (always visible) -->
  <div class="panel-compact">

    <!-- Transport Mode Pills -->
    <div class="transport-pills">
      <button class="transport-pill active" data-mode="foot" onclick="setTransportMode('foot', this)">
        <span class="pill-icon">🚶</span>
        <span class="pill-label">Jalan Kaki</span>
      </button>
      <button class="transport-pill" data-mode="bike" onclick="setTransportMode('bike', this)">
        <span class="pill-icon">🏍️</span>
        <span class="pill-label">Motor</span>
      </button>
      <button class="transport-pill" data-mode="driving" onclick="setTransportMode('driving', this)">
        <span class="pill-icon">🚗</span>
        <span class="pill-label">Mobil</span>
      </button>
    </div>

    <!-- Route Inputs Row -->
    <div class="inputs-row">
      <div class="input-wrap">
        <div class="input-dot start-dot"></div>
        <select id="select-start" class="route-select">
          <option value="">Titik Awal</option>
        </select>
      </div>

      <button class="swap-btn" onclick="swapLocations()" title="Tukar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 16V4m0 0L3 8m4-4 4 4"/><path d="M17 8v12m0 0 4-4m-4 4-4-4"/></svg>
      </button>

      <div class="input-wrap">
        <div class="input-dot end-dot"></div>
        <select id="select-end" class="route-select">
          <option value="">Titik Tujuan</option>
        </select>
      </div>

      <button class="go-btn" id="search-btn" onclick="findPath()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span>Cari</span>
      </button>
    </div>
  </div>

  <!-- EXPANDED RESULT (toggled) -->
  <div class="panel-expanded" id="panel-expanded">
    <div class="expand-divider"></div>
    <div id="result-panel" class="result-content">
      <div class="empty-state">
        <div class="empty-icon">🗺️</div>
        <div class="empty-title">Siap Navigasi</div>
        <div class="empty-desc">Pilih titik awal & tujuan lalu tekan Cari</div>
      </div>
    </div>
  </div>

</div>

<!-- ===== LOCATION LIST PANEL ===== -->
<div class="location-panel" id="location-panel">
  <div class="loc-panel-header">
    <div class="loc-panel-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Semua Lokasi UNIB
    </div>
    <button class="close-btn" onclick="toggleLocationPanel()">✕</button>
  </div>
  <div class="loc-search-wrap">
    <svg class="loc-search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="location-search" class="loc-search-input" placeholder="Cari lokasi..." autocomplete="off" />
  </div>
  <div class="location-list" id="location-list"></div>
</div>

<!-- ===== ZOOM CONTROLS ===== -->
<div class="zoom-controls">
  <button class="zoom-btn" onclick="AppState.map.zoomIn()">＋</button>
  <div class="zoom-divider"></div>
  <button class="zoom-btn" onclick="AppState.map.zoomOut()">－</button>
</div>

<!-- ===== RESET BUTTON (appears after route found) ===== -->
<button class="reset-fab" id="reset-fab" onclick="resetRoute()" title="Reset Rute">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
</button>

<!-- ===== LOADING ===== -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-card">
    <div class="loading-spinner"></div>
    <div class="loading-title">Menghitung Rute</div>
    <div class="loading-sub" id="loading-sub">Algoritma A* sedang berjalan...</div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast-stack" id="toast-container"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/api.js"></script>
<script src="/js/animation.js"></script>
<script src="/js/map.js"></script>
</body>
</html>
